<style>
  :root {
    --primary: #0052CC;
    --primary-hover: #0065FF;
    --primary-light: #DEEBFF;
    --bg: #FAFBFC;
    --bg-white: #FFFFFF;
    --sidebar-bg: #F4F5F7;
    --border: #DFE1E6;
    --text: #172B4D;
    --text-secondary: #6B778C;
    --text-light: #97A0AF;
    --success: #00875A;
    --warning: #FF991F;
    --danger: #DE350B;
    --star: #FFAB00;
    --tag-bg: #EAE6FF;
    --tag-text: #403294;
    --radius: 4px;
    --shadow: 0 1px 2px rgba(9,30,66,0.08), 0 0 1px rgba(9,30,66,0.12);
    --shadow-hover: 0 4px 8px rgba(9,30,66,0.08), 0 0 1px rgba(9,30,66,0.12);
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    --sidebar-width: 280px;
    --header-height: 56px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    color: var(--text);
    background: var(--bg);
    line-height: 1.5;
    font-size: 14px;
  }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  #app-header {
    height: var(--header-height);
    background: var(--primary);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }

  .header-logo {
    color: white;
    font-size: 18px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    white-space: nowrap;
  }

  .header-nav {
    display: flex;
    gap: 4px;
  }

  .header-nav a {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
  }

  .header-nav a:hover, .header-nav a.active {
    background: rgba(255,255,255,0.15);
    color: white;
  }

  .header-search {
    flex: 1;
    max-width: 500px;
    position: relative;
  }

  .header-search input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    background: rgba(255,255,255,0.2);
    color: white;
    outline: none;
    transition: background 0.15s;
  }

  .header-search input::placeholder { color: rgba(255,255,255,0.6); }
  .header-search input:focus { background: white; color: var(--text); }
  .header-search input:focus::placeholder { color: var(--text-light); }

  .header-search .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.6);
    pointer-events: none;
  }

  .header-search input:focus ~ .search-icon { color: var(--text-light); }

  .header-spacer { flex: 1; }

  .header-user {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 13px;
    color: white;
  }

  /* Body layout */
  #app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  #app-sidebar {
    width: var(--sidebar-width);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 16px 0;
  }

  .sidebar-section {
    margin-bottom: 16px;
  }

  .sidebar-heading {
    padding: 4px 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    padding: 6px 20px;
    color: var(--text);
    text-decoration: none;
    cursor: pointer;
    font-size: 14px;
    gap: 8px;
    transition: background 0.1s;
  }

  .sidebar-item:hover { background: rgba(9,30,66,0.04); }
  .sidebar-item.active { background: var(--primary-light); color: var(--primary); }

  .sidebar-item .icon {
    width: 20px;
    text-align: center;
    flex-shrink: 0;
    font-size: 16px;
  }

  .sidebar-item .label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Main content */
  #app-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }

  /* Cards */
  .card {
    background: var(--bg-white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
  }

  .card-link {
    color: var(--primary);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
  }

  .card-link:hover { text-decoration: underline; }

  /* Page tree */
  .page-tree { list-style: none; }

  .tree-item {
    display: flex;
    align-items: center;
    padding: 6px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    gap: 6px;
    font-size: 14px;
    transition: background 0.1s;
  }

  .tree-item:hover { background: rgba(9,30,66,0.04); }

  .tree-toggle {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: var(--radius);
    flex-shrink: 0;
    font-size: 12px;
    color: var(--text-secondary);
    transition: transform 0.15s;
  }

  .tree-toggle.expanded { transform: rotate(90deg); }
  .tree-toggle.empty { visibility: hidden; }

  .tree-icon {
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .tree-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tree-name a {
    color: var(--text);
    text-decoration: none;
  }

  .tree-name a:hover { color: var(--primary); text-decoration: underline; }

  .tree-meta {
    font-size: 12px;
    color: var(--text-light);
    white-space: nowrap;
  }

  .tree-children {
    list-style: none;
    padding-left: 28px;
  }

  .tree-children.collapsed { display: none; }

  /* Activity list */
  .activity-list { list-style: none; }

  .activity-item {
    display: flex;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .activity-item:last-child { border-bottom: none; }

  .activity-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--primary);
  }

  .activity-body { flex: 1; min-width: 0; }

  .activity-title {
    font-weight: 500;
  }

  .activity-title a {
    color: var(--text);
    text-decoration: none;
  }

  .activity-title a:hover { color: var(--primary); text-decoration: underline; }

  .activity-meta {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* Search results */
  .search-result {
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .search-result:last-child { border-bottom: none; }

  .search-result-title {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .search-result-title a {
    color: var(--primary);
    text-decoration: none;
  }

  .search-result-title a:hover { text-decoration: underline; }

  .search-result-breadcrumb {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .search-result-meta {
    font-size: 12px;
    color: var(--text-light);
  }

  /* Tags */
  .tag {
    display: inline-block;
    padding: 2px 8px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 3px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    margin: 2px;
    transition: opacity 0.15s;
  }

  .tag:hover { opacity: 0.8; }

  .tag-cloud { display: flex; flex-wrap: wrap; gap: 4px; }

  /* Star button */
  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-light);
    padding: 4px;
    transition: color 0.15s;
  }

  .star-btn:hover { color: var(--star); }
  .star-btn.starred { color: var(--star); }

  /* Breadcrumb */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }

  .breadcrumb a {
    color: var(--primary);
    text-decoration: none;
  }

  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb .sep { color: var(--text-light); }

  /* Spaces grid */
  .spaces-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  .space-card {
    background: var(--bg-white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    cursor: pointer;
    transition: box-shadow 0.15s;
  }

  .space-card:hover { box-shadow: var(--shadow-hover); }

  .space-card-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius);
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    font-size: 20px;
    color: var(--primary);
  }

  .space-card-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .space-card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .space-card-meta {
    font-size: 12px;
    color: var(--text-light);
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--text-secondary);
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-secondary);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; max-width: 400px; margin: 0 auto; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: background 0.15s;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover { background: var(--primary-hover); }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: rgba(9,30,66,0.04); }

  /* Tag input */
  .tag-input-wrap {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .tag-input-wrap input {
    flex: 1;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    outline: none;
  }

  .tag-input-wrap input:focus { border-color: var(--primary); }

  /* Page detail panel */
  .page-detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .page-detail-header h1 {
    font-size: 24px;
    font-weight: 600;
  }

  .page-detail-meta {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }

  .page-detail-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  /* Folder meta */
  .folder-meta {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  /* Confluence-style page tree */
  .cf-index-card {
    padding: 20px 24px;
  }

  .cf-tree {
    border-top: 1px solid var(--border);
    padding-top: 4px;
  }

  .cf-tree-row {
    display: flex;
    align-items: center;
    padding: 0;
    transition: background 0.1s;
    border-radius: var(--radius);
    margin: 0;
  }

  .cf-tree-row:hover {
    background: rgba(9,30,66,0.04);
  }

  .cf-tree-indent {
    flex-shrink: 0;
    width: calc(var(--depth) * 28px);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 4px;
  }

  .cf-tree-connector {
    color: var(--border);
    font-family: monospace;
    font-size: 14px;
    line-height: 1;
    user-select: none;
  }

  .cf-tree-content {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    min-width: 0;
    border-bottom: 1px solid rgba(9,30,66,0.04);
  }

  .cf-tree-root > .cf-tree-content {
    border-bottom: 1px solid var(--border);
  }

  .cf-tree-root:last-child > .cf-tree-content,
  .cf-tree-last > .cf-tree-content {
    border-bottom-color: transparent;
  }

  .cf-tree-icon {
    flex-shrink: 0;
    width: 20px;
    text-align: center;
    font-size: 16px;
  }

  .cf-tree-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 14px;
  }

  .cf-tree-name a {
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
  }

  .cf-tree-name a:hover {
    color: var(--primary);
    text-decoration: underline;
  }

  .cf-tree-count {
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-light);
    background: var(--sidebar-bg);
    padding: 1px 6px;
    border-radius: 10px;
  }

  .cf-tree-date {
    flex-shrink: 0;
    font-size: 12px;
    color: var(--text-light);
    width: 70px;
    text-align: right;
  }

  .cf-tree-author {
    flex-shrink: 0;
    font-size: 12px;
    color: var(--text-light);
    width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: right;
  }

  .cf-tree-children {
    position: relative;
  }

  .cf-tree-children::before {
    content: '';
    position: absolute;
    left: calc(var(--depth) * 28px + 20px);
    top: 0;
    bottom: 12px;
    width: 1px;
    background: var(--border);
  }

  /* Responsive */
  @media (max-width: 768px) {
    #app-sidebar { display: none; }
    #app-content { padding: 16px; }
    .spaces-grid { grid-template-columns: 1fr; }
  }
</style>
