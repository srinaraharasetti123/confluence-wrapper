<script>
const Utils = {
  escape(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  },

  formatDate(isoString) {
    if (!isoString) return '';
    const date = new Date(isoString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);

    if (diffMins < 1) return 'Just now';
    if (diffMins < 60) return diffMins + 'm ago';
    if (diffHours < 24) return diffHours + 'h ago';
    if (diffDays < 7) return diffDays + 'd ago';

    return date.toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
    });
  },

  debounce(fn, ms) {
    let timer;
    return function(...args) {
      clearTimeout(timer);
      timer = setTimeout(() => fn.apply(this, args), ms);
    };
  },

  getMimeIcon(mimeType) {
    const icons = {
      'application/vnd.google-apps.document': '\u{1F4DD}',
      'application/vnd.google-apps.spreadsheet': '\u{1F4CA}',
      'application/vnd.google-apps.presentation': '\u{1F4C8}',
      'application/vnd.google-apps.folder': '\u{1F4C1}',
      'application/vnd.google-apps.form': '\u{1F4CB}',
      'application/pdf': '\u{1F4C4}',
      'image/': '\u{1F5BC}',
    };

    for (const [key, icon] of Object.entries(icons)) {
      if (mimeType && mimeType.startsWith(key)) return icon;
    }
    return '\u{1F4CE}';
  },

  getMimeLabel(mimeType) {
    const labels = {
      'application/vnd.google-apps.document': 'Doc',
      'application/vnd.google-apps.spreadsheet': 'Sheet',
      'application/vnd.google-apps.presentation': 'Slides',
      'application/vnd.google-apps.folder': 'Folder',
      'application/vnd.google-apps.form': 'Form',
      'application/pdf': 'PDF',
    };
    return labels[mimeType] || 'File';
  },

  isFolder(mimeType) {
    return mimeType === 'application/vnd.google-apps.folder';
  },

  loading() {
    return '<div class="loading"><div class="spinner"></div>Loading...</div>';
  },

  emptyState(icon, title, message) {
    return `
      <div class="empty-state">
        <div class="icon">${icon}</div>
        <h3>${Utils.escape(title)}</h3>
        <p>${Utils.escape(message)}</p>
      </div>
    `;
  }
};
</script>
